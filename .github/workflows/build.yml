name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install npm dependencies
      run: npm install

    - name: Build Tauri app
      run: npx tauri build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Package as ZIP
      run: |
        Compress-Archive -Path src-tauri/target/release/YT-FileTimeEditor.exe -DestinationPath YT-FileTimeEditor.zip -Force

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: YT-FileTimeEditor
        path: YT-FileTimeEditor.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: YT-FileTimeEditor.zip
        body: |
          ## YT-FileTimeEditor v2.0.0

          文件时间编辑器（Tauri 重构版）

          ### 功能特性
          - 批量修改创建时间/修改时间/访问时间
          - 所有者(Owner)属性修改
          - 显示所有属性：文件名/路径/创建时间/修改时间/访问时间/大小/所有者
          - 可拖动分割线布局
          - 原生日期选择器

          ### 安装说明
          下载 ZIP → 解压 → 运行 YT-FileTimeEditor.exe
